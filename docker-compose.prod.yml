# ============================================================
# Production Docker Compose Override
# Uses pre-built images from Docker Hub
# ============================================================

version: "3.9"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  backend_data:
  alertmanager_data:

services:

  frontend:
    image: ${DOCKER_USERNAME}/fusionpact-frontend:${IMAGE_TAG:-latest}
    container_name: fusionpact_frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ${DOCKER_USERNAME}/fusionpact-backend:${IMAGE_TAG:-latest}
    container_name: fusionpact_backend
    restart: always
    ports:
      - "8000:8000"
    networks:
      - backend_net
      - monitoring_net
    volumes:
      - backend_data:/app/data
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fusionpact_prometheus
    restart: always
    ports:
      - "9090:9090"
    networks:
      - monitoring_net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:10.2.2
    container_name: fusionpact_grafana
    restart: always
    ports:
      - "3000:3000"
    networks:
      - monitoring_net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: fusionpact_node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - monitoring_net
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: fusionpact_cadvisor
    restart: always
    ports:
      - "8080:8080"
    networks:
      - monitoring_net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: fusionpact_alertmanager
    restart: always
    ports:
      - "9093:9093"
    networks:
      - monitoring_net
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
