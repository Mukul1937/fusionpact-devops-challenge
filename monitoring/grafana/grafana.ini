#################################### Server ####################################
[server]
domain = localhost
http_port = 3000
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false

#################################### Security ##################################
[security]
admin_user = admin
disable_gravatar = true
cookie_secure = false
cookie_samesite = lax
allow_embedding = true

#################################### Users #####################################
[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

#################################### Analytics #################################
[analytics]
reporting_enabled = false
check_for_updates = false

#################################### Dashboards ################################
[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/infrastructure.json

#################################### Logging ###################################
[log]
mode = console
level = info
