# ============================================================
# Fusionpact DevOps Gauntlet - Docker Compose Configuration
# Production-Ready Multi-Service Orchestration
# ============================================================

version: "3.9"

# �� Networks ������������������������������������������������
networks:
  frontend_net:
    driver: bridge
    name: fusionpact_frontend
  backend_net:
    driver: bridge
    name: fusionpact_backend
  monitoring_net:
    driver: bridge
    name: fusionpact_monitoring

# �� Volumes �������������������������������������������������
volumes:
  prometheus_data:
    driver: local
    name: fusionpact_prometheus_data
  grafana_data:
    driver: local
    name: fusionpact_grafana_data
  backend_data:
    driver: local
    name: fusionpact_backend_data
  alertmanager_data:
    driver: local
    name: fusionpact_alertmanager_data

# �� Services ������������������������������������������������
services:

  # �� Frontend (Nginx + Static Files) ����������������������
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
#      target: production
    container_name: fusionpact_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.fusionpact.service=frontend"
      - "com.fusionpact.environment=${ENVIRONMENT:-production}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # �� Backend (FastAPI) �������������������������������������
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
 #     target: production
    container_name: fusionpact_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - backend_net
      - monitoring_net
    volumes:
      - backend_data:/app/data
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.fusionpact.service=backend"
      - "com.fusionpact.environment=${ENVIRONMENT:-production}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # �� Prometheus ��������������������������������������������
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fusionpact_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring_net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--log.level=info"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.fusionpact.service=prometheus"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # �� Grafana �����������������������������������������������
  grafana:
    image: grafana/grafana:10.2.2
    container_name: fusionpact_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - monitoring_net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-FusionpactAdmin2026!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.fusionpact.service=grafana"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # �� Node Exporter (Host Metrics) ��������������������������
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: fusionpact_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring_net
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    labels:
      - "com.fusionpact.service=node-exporter"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # �� cAdvisor (Container Metrics) �������������������������
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: fusionpact_cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - monitoring_net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      - "com.fusionpact.service=cadvisor"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # �� AlertManager ������������������������������������������
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: fusionpact_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    networks:
      - monitoring_net
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=info"
    labels:
      - "com.fusionpact.service=alertmanager"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
